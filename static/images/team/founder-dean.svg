<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <!-- Portrait of 阿正_Dean — the founder keeps his face off the record. -->
  <defs>
    <radialGradient id="halo" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#123422"/>
      <stop offset=".65" stop-color="#0b1712"/>
      <stop offset="1" stop-color="#070d0a"/>
    </radialGradient>
    <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#182420"/>
      <stop offset=".55" stop-color="#0f1a15"/>
      <stop offset="1" stop-color="#0a120e"/>
    </linearGradient>
    <linearGradient id="visor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39f07d" stop-opacity="0"/>
      <stop offset=".18" stop-color="#39f07d" stop-opacity=".9"/>
      <stop offset=".5" stop-color="#b8ffd6"/>
      <stop offset=".82" stop-color="#39f07d" stop-opacity=".9"/>
      <stop offset="1" stop-color="#39f07d" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="soft-sm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000"/>
    </pattern>
  </defs>

  <rect width="800" height="800" fill="url(#halo)"/>

  <!-- dot grid atmosphere -->
  <g fill="#39f07d" opacity=".1">
    <g id="dr">
      <circle cx="40" cy="40" r="1.3"/><circle cx="120" cy="40" r="1.3"/><circle cx="200" cy="40" r="1.3"/>
      <circle cx="280" cy="40" r="1.3"/><circle cx="360" cy="40" r="1.3"/><circle cx="440" cy="40" r="1.3"/>
      <circle cx="520" cy="40" r="1.3"/><circle cx="600" cy="40" r="1.3"/><circle cx="680" cy="40" r="1.3"/>
      <circle cx="760" cy="40" r="1.3"/>
    </g>
    <use href="#dr" y="80"/><use href="#dr" y="160"/><use href="#dr" y="240"/><use href="#dr" y="320"/>
    <use href="#dr" y="400"/><use href="#dr" y="480"/><use href="#dr" y="560"/><use href="#dr" y="640"/><use href="#dr" y="720"/>
  </g>

  <!-- falling code columns -->
  <g fill="none" stroke="#39f07d" stroke-width="2" stroke-linecap="round" opacity=".16">
    <path d="M96 96v58M96 178v22M96 232v40"/>
    <path d="M148 140v30M148 194v64M148 288v18"/>
    <path d="M652 110v44M652 180v20M652 226v52"/>
    <path d="M704 84v26M704 136v60M704 224v30"/>
    <path d="M60 560v40M60 626v22"/>
    <path d="M740 540v30M740 596v46"/>
  </g>

  <!-- circuit traces -->
  <g fill="none" stroke="#2a7a4d" stroke-width="1.6" opacity=".5">
    <path d="M0 700h132l40-40h96"/>
    <path d="M800 686h-110l-34 34h-88"/>
    <path d="M0 128h84l30 30h58"/>
    <path d="M800 170h-96l-26-26h-52"/>
  </g>
  <g fill="#39f07d" opacity=".6">
    <circle cx="268" cy="660" r="4"/><circle cx="568" cy="720" r="4"/>
    <circle cx="172" cy="158" r="4"/><circle cx="626" cy="144" r="4"/>
  </g>

  <!-- figure -->
  <g>
    <!-- glow behind hood -->
    <ellipse cx="400" cy="380" rx="210" ry="240" fill="#1c5c38" opacity=".33" filter="url(#soft)"/>

    <!-- shoulders / cloak -->
    <path d="M400 470c-118 0-208 62-248 148-14 30-22 74-24 118-1 22 10 40 32 40h480c22 0 33-18 32-40-2-44-10-88-24-118-40-86-130-148-248-148Z"
          fill="url(#hood)" stroke="#39f07d" stroke-opacity=".38" stroke-width="2"/>
    <!-- collar seam -->
    <path d="M400 480c-40 0-74 26-88 60l40 236h96l40-236c-14-34-48-60-88-60Z" fill="#070d0a" opacity=".85"/>
    <path d="M352 540l48 60 48-60" fill="none" stroke="#39f07d" stroke-opacity=".4" stroke-width="2"/>

    <!-- red-hacker star on the chest -->
    <path d="M400 620l7.6 15.4 17 2.5-12.3 12 2.9 16.9-15.2-8-15.2 8 2.9-16.9-12.3-12 17-2.5Z"
          fill="#ff5a45" opacity=".92"/>

    <!-- hood -->
    <path d="M400 128c-104 0-172 84-176 196-2 62 16 118 44 156 16 22 44 34 66 22 20-11 44-17 66-17s46 6 66 17c22 12 50 0 66-22 28-38 46-94 44-156-4-112-72-196-176-196Z"
          fill="url(#hood)" stroke="#39f07d" stroke-opacity=".5" stroke-width="2"/>
    <!-- hood inner shadow / void where a face would be -->
    <path d="M400 200c-62 0-104 52-106 122-1 46 12 86 34 112 13 15 30 22 48 22h48c18 0 35-7 48-22 22-26 35-66 34-112-2-70-44-122-106-122Z" fill="#04080699"/>
    <path d="M400 208c-58 0-96 48-98 114-1 43 11 80 31 104 12 14 28 20 44 20h46c16 0 32-6 44-20 20-24 32-61 31-104-2-66-40-114-98-114Z" fill="#030605"/>

    <!-- visor light -->
    <rect x="286" y="330" width="228" height="22" rx="11" fill="#39f07d" opacity=".35" filter="url(#soft)"/>
    <rect x="300" y="337" width="200" height="7" rx="3.5" fill="url(#visor)" filter="url(#soft-sm)"/>
    <rect x="300" y="337" width="200" height="7" rx="3.5" fill="url(#visor)"/>

    <!-- hood stitch details -->
    <path d="M330 176c22-16 44-24 70-24s48 8 70 24" fill="none" stroke="#39f07d" stroke-opacity=".25" stroke-width="2" stroke-dasharray="2 8" stroke-linecap="round"/>
  </g>

  <!-- terminal footer -->
  <g font-family="IBM Plex Mono, ui-monospace, monospace" font-size="17" letter-spacing="2">
    <text x="72" y="762" fill="#39f07d" opacity=".85">root@airdb:~#</text>
    <text x="238" y="762" fill="#b8ffd6" opacity=".7">identity --hidden</text>
    <rect x="452" y="748" width="10" height="17" fill="#39f07d" opacity=".9"/>
  </g>

  <!-- scanlines -->
  <rect width="800" height="800" fill="url(#scan)" opacity=".07"/>
</svg>
